<html lang="pt-br" dir="ltr">

    <head>

        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Login</title>

        <link rel="stylesheet" href="assets/css/login.css">
        
    </head>

    <body>

        <main>

            <section class="fundo">

                <img class="logo" src="assets/img/logo.png" alt="Logo AlphaClub">

                <nav>

                    <form> 

                        <input class="usuario" type="text" placeholder="Usuário" required minlength="3" maxlength="15" title="Digite apenas letras, sem espaços ou números (entre 3 e 15 caracteres)."> 

                        <input class="senha" type="password" placeholder="Senha" required minlength="5" maxlength="15" title="Digite uma senha ente 5 e 15 caracteres"> 

                        <button class="concluir-login" type="submit">Concluir Login</button> 

                    </form> 
 
                        <button class="pagina-treinos" type="button">Página de Treinos</button> 

                </nav>

            </section>

        </main>
      
    </body>

</html>
