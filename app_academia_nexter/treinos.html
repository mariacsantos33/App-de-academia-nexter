<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Acesse seus treinos</title>
        <link rel="stylesheet" href="assets/css/treinos.css">
    </head>
    <body>

        <header>
            <div class="header-conteudo">
                <button class="botao-voltar">
                    <img src="assets/img/img_seta.png" alt="Voltar">
                </button>
                <h1>Acesse o seus treinos</h1>
                <button class="botao-menu">
                    <img src="assets/img/img_menu.png" alt="Menu">
                </button>
            </div>
        </header>

        <main class="container-treinos">
        
            <section class="card-treino">
                <img src="assets/img/treino_a_certa.png" alt="Treino A" class="imagem-fundo">
                <div class="info-treino">
                    <h2>TREINO A</h2>
                    <p>treino de quadríceps</p>
                    <button class="botao-acessar">ACESSAR TREINO</button>
                </div>
            </section>

            <section class="card-treino">
                <img src="assets/img/treino_b_certa.png" alt="Treino B" class="imagem-fundo">
                <div class="info-treino">
                    <h2>TREINO B</h2>
                    <p>treino de costas e bíceps</p>
                    <button class="botao-acessar">ACESSAR TREINO</button>
                </div>
            </section>

            <section class="card-treino">
                <img src="assets/img/treino_c_certa.png" alt="Treino C" class="imagem-fundo">
                <div class="info-treino">
                    <h2>TREINO C</h2>
                    <p>treino de glúteos</p>
                    <button class="botao-acessar">ACESSAR TREINO</button>
                </div>
            </section>

            <section class="card-treino">
                <img src="assets/img/treino_d_certa.png" alt="Treino D" class="imagem-fundo">
                <div class="info-treino">
                    <h2>TREINO D</h2>
                    <p>treino de ombros e tríceps</p>
                    <button class="botao-acessar">ACESSAR TREINO</button>
                </div>
            </section>

            <section class="card-treino">
                <img src="assets/img/treino_e_certa.png" alt="Treino E" class="imagem-fundo">
                <div class="info-treino">
                    <h2>TREINO E</h2>
                    <p>treino completo</p>
                    <button class="botao-acessar">ACESSAR TREINO</button>
                </div>
            </section>
        </main>

    </body>
</html>
