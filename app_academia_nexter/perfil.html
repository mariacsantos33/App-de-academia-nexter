<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil do Usuário</title>
        <link rel="stylesheet" href="assets/css/perfil.css">
    </head>
    <body>

        <header>
            <div class="header-conteudo">
                <button class="botao-voltar">
                    <img src="assets/img/img_seta.png" alt="Voltar">
                </button>
                <button class="botao-menu">
                    <img src="assets/img/img_menu.png" alt="Menu">
                </button>
            </div>
        </header>

        <main class="container-perfil">
        
            <section class="topo-perfil">
                <div class="foto-usuario">
                    <img src="assets/img/img_perfil.png" alt="Usuário">
                </div>
                <h2>Nome do usuário</h2>
                <p>plano sba</p>
            </section>

        
            <section class="info-pessoal">
                <div class="campo">
                        <label>Nome:</label>
                        <div class="input-fake"></div>
                    </div>
                    <div class="campo">
                        <label>Peso:</label>
                        <div class="input-fake"></div>
                    </div>
                    <div class="campo">
                        <label>Data de Nascimento:</label>
                        <div class="input-fake"></div>
                    </div>
                    <div class="campo">
                        <label>Objetivo:</label>
                    <div class="input-fake"></div>
                </div>
            </section>

            <section class="outros-acessos">
                <h3>Outros acessos</h3>
                <div class="botoes-grupo">
                    <button class="btn-acesso">VER OUTROS PLANOS</button>
                    <button class="btn-acesso">PARTICIPAR DE DESAFIOS</button>
                    <button class="btn-acesso">AGENDAMENTO AVALIAÇÃO</button>
                    <button class="btn-acesso">AGENDAMENTO DE AULAS</button>
                    <button class="btn-acesso">MINHA EVOLUÇÃO FÍSICA</button>
                    <button class="btn-acesso">ALTERAR CADASTRO</button>
                </div>
            </section>
        </main>

    </body>
</html>
