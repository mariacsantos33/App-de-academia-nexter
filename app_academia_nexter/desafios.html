<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Desafios do Mês</title>
        <link rel="stylesheet" href="assets/css/desafios.css">
    </head>
    <body>

        <header>
            <div class="header-conteudo">
                <button class="botao-voltar">
                    <img src="assets/img/img_seta.png" alt="Voltar">
                </button>
                <button class="botao-menu">
                    <img src="assets/img/img_menu.png" alt="Menu">
                </button>
            </div>
        </header>

        <main class="container-desafios">
            <h1>DESAFIOS DO MÊS</h1>

            <div class="lista-cards">
            
                <section class="card-desafio">
                    <img src="assets/img/logo_app.png" alt="Logo Alpha" class="logo-card">
                    <div class="info-card">
                        <h2>ABRIL: 15 Checkins</h2>
                        <button class="btn-participar">PARTICIPAR</button>
                    </div>
                </section>

            
                <section class="card-desafio">
                    <img src="assets/img/logo_app.png" alt="Logo Alpha" class="logo-card">
                    <div class="info-card">
                        <h2>CAÇA AO BEM-ESTAR DA PÁSCOA: 20 Checkins</h2>
                        <button class="btn-participar">PARTICIPAR</button>
                    </div>
                </section>

          
                <section class="card-desafio">
                    <img src="assets/img/logo_app.png" alt="Logo Alpha" class="logo-card">
                    <div class="info-card">
                        <h2>MAIO: 10 Checkins</h2>
                        <button class="btn-participar">PARTICIPAR</button>
                    </div>
                </section>

           
                <section class="card-desafio">
                    <img src="assets/img/logo_app.png" alt="Logo Alpha" class="logo-card">
                    <div class="info-card">
                        <h2>TEMPORADA BEM ESTAR: 30 Checkins</h2>
                        <button class="btn-participar">PARTICIPAR</button>
                    </div>
                </section>
            </div>

            <button class="btn-medalhas">VER MINHAS MEDALHAS</button>
        </main>

    </body>
</html>
