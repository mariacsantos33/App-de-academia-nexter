<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minhas Medalhas</title>
        <link rel="stylesheet" href="assets/css/minhasmedalhas.css">
    </head>
    <body>

        <header>
            <div class="header-conteudo">
                <button class="botao-voltar">
                    <img src="assets/img/img_seta.png" alt="Voltar">
                </button>
                <button class="botao-menu">
                    <img src="assets/img/img_menu.png" alt="Menu">
                </button>
            </div>

        </header>

        <main class="container-medalhas">
            <h1>MINHAS MEDALHAS:</h1>

            <div class="lista-medalhas">
                <section class="card-mes">
                    <h3>JANEIRO</h3>
                    <img src="assets/img/img_medalha.png" alt="Medalha" class="medalha-img">
                </section>

                <section class="card-mes">
                    <h3>FEVEREIRO</h3>
                    <img src="assets/img/img_medalha.png" alt="Medalha" class="medalha-img">
                </section>

                <section class="card-mes">
                    <h3>MARÇO</h3>
                    <img src="assets/img/img_medalha.png" alt="Medalha" class="medalha-img">
                </section>

                <section class="card-mes">
                    <h3>ABRIL</h3>
                    <img src="assets/img/img_medalha.png" alt="Medalha" class="medalha-img">
                </section>

                <section class="card-mes">
                    <h3>MAIO</h3>
                    <img src="assets/img/img_medalha.png" alt="Medalha" class="medalha-img">
                </section>
            </div>

            <button class="btn-voltar-treinos">VOLTAR A PÁGINA DE TREINOS</button>
        </main>

    </body>
</html>
