<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Conheça outros planos</title>
        <link rel="stylesheet" href="assets/css/conhecaoutrosplanos.css">
    </head>
    <body>

        <header>
            <button class="botao-voltar">
                <img src="assets/img/img_seta.png" alt="Voltar">
            </button>
            <button class="botao-menu">
                <img src="assets/img/img_menu.png" alt="Menu">
            </button>
        </header>

        <main class="container-planos">
            <h1>CONHEÇA OUTROS PLANOS</h1>

            <div class="lista-planos">
            
                <section class="card-plano">
                    <h2>PLANO START</h2>
                    <p>Aproveite nossas melhores opções em cuidado pessoal e bem-estar, de graça!</p>
                    <button class="btn-saiba-mais">SAIBA MAIS</button>
                </section>

                <section class="card-plano">
                    <h2>PLANO BASIC</h2>
                    <p>Tenha mais variedade em sua rotina e descubra novas formas de treinar.</p>
                    <button class="btn-saiba-mais">SAIBA MAIS</button>
                </section>

                <section class="card-plano">
                    <h2>PLANO ALPHA</h2>
                    <p>O melhor do plano Basic, com mais opções de atividades físicas e bem-estar.</p>
                    <button class="btn-saiba-mais">SAIBA MAIS</button>
                </section>
            </div>

            <button class="btn-voltar-treinos">VOLTAR À PÁGINA DE TREINOS</button>
        </main>

    </body>
</html>
