        <header class="header-treinos">

        <main class="conteudo-treinos">
            <h2 class="titulo-pagina">SELECIONE O DIA E HORÁRIO:</h2>
            
            <div class="calendario-container">
                <div class="campo-data-container">
                    <label for="data-agendamento">Escolha a data:</label>
                    <input type="date" id="data-agendamento" name="data-agendamento" class="input-data-nativo">
                </div>

                <div class="grade-horarios">
                    <div class="item-horario">
                        <span class="hora">07:30 - 08:20</span>
                        <span class="vagas">4 vagas restantes</span>
                        <a href="conclusao-agendamento-aula.html" class="botao-confirmar">RESERVAR</a>
                    </div>
                    <div class="item-horario">
                        <span class="hora">10:40 - 11:20</span>
                        <span class="vagas">1 vaga restante</span>
                        <a href="conclusao-agendamento-aula.html" class="botao-confirmar">RESERVAR</a>
                    </div>
                    <div class="item-horario esgotado">
                        <span class="hora">13:30 - 14:10</span>
                        <span class="vagas">Esgotado</span>
                        <a class="botao-confirmar desabilitado">LOTADO</a>
                    </div>
                    <div class="item-horario">
                        <span class="hora">15:10 - 16:00</span>
                        <span class="vagas">8 vagas restantes</span>
                        <a href="conclusao-agendamento-aula.html" class="botao-confirmar">RESERVAR</a>
                    </div>
                </div>
            </div>
