<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Alunos</title>

  <link rel="stylesheet" href="assets/css/estilo7.css">
</head>

<body>

  <header class="topo">
    <img src="assets/img/Logo-Alpha Club.png" class="logo" alt="Logo-Alpha">
    <p>Olá Administrador</p>
  </header>

  <div class="layout">

    <aside class="barra-lateral">

      <div class="menu">

        <a href="index3.html#graficos-baixo"> <button class="btn ativo">Painel de Controle</button></a>
        <a href="index3.html#conteudo"><button class="btn"> Financeiro</button></a> 
        <a href="index4.html"><button class="btn">Alunos</button></a>


      </div>

      <div class="bottom-menu">

        <div class="perfil-menu">
          <img src="assets/img/foto-perfil.png" alt="foto-perfil">
          <a href="index7.html">
            <button class="botao-perfil">Perfil</button>
          </a>
        </div>

        <div class="perfil-menu">
          <img src="assets/img/imagem-sair.png" alt="imagem-sair">
          <a href="index1.html">
            <button class="botao-sair">Sair</button>
          </a>
        </div>

      </div>

    </aside>

    <main class="conteudo">

      <div class="titulo-perfil">

        <h1>Perfil do Usuário</h1>

        <p>
          Gerencie suas informações e preferências
        </p>

      </div>

      <!-- CONTAINER DOS CARDS -->
      <div class="cards-container">

        <section class="card-perfil">

          <div class="topo-perfil">

            <div class="foto-perfil">
              C
            </div>

            <div class="info-perfil">

              <h2>Carlos Souza</h2>

              <p>Administrador</p>

              <button class="botao">
                ALTERAR FOTO
              </button>

            </div>

          </div>

        </section>

        <section class="card">

          <h3>Informações Pessoais</h3>

          <div class="formulario">

            <div class="campo">

              <label>Nome Completo</label>

              <input type="text" value="Carlos Souza">

            </div>

            <div class="campo">

              <label>Email</label>

              <input type="email" value="admin@email.com">

            </div>

            <div class="campo">

              <label>Telefone</label>

              <input type="text" value="(11) 98765-4321">

            </div>

            <div class="campo">

              <label>Data de Nascimento</label>

              <input type="date">

            </div>

          </div>

          <button class="botao">
            ALTERAR INFORMAÇÕES
          </button>

        </section>

        <section class="card">

          <h3>Segurança</h3>

          <div class="formulario">

            <div class="campo senha">

              <label>Senha Atual</label>

              <input type="password" value="12345678">

            </div>

            <div class="campo">

              <label>Nova Senha</label>

              <input type="password" value="12345678">

            </div>

            <div class="campo">

              <label>Confirmar Nova Senha</label>

              <input type="password" value="12345678">

            </div>

          </div>

          <button class="botao">
            ALTERAR SENHA
          </button>

        </section>

      </div>

    </main>

  </div>

</body>

</html>
